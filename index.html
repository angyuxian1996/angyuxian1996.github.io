<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>夜行区调查系统</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      overflow: hidden;
      background: linear-gradient(to bottom, #020617, #1e1b4b, #000000);
    }

    .glow-1 {
      position: absolute;
      width: 300px;
      height: 300px;
      background: #c026d3;
      border-radius: 9999px;
      filter: blur(120px);
      opacity: 0.3;
      top: -50px;
      left: -50px;
    }

    .glow-2 {
      position: absolute;
      width: 300px;
      height: 300px;
      background: #06b6d4;
      border-radius: 9999px;
      filter: blur(120px);
      opacity: 0.3;
      bottom: -50px;
      right: -50px;
    }

    .hidden-box {
      display: none;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center text-white p-6 relative">

  <!-- Background -->
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <!-- Main Card -->
  <div class="relative w-full max-w-xl rounded-3xl border border-cyan-500/30 bg-slate-900/80 backdrop-blur-xl shadow-2xl overflow-hidden">

    <!-- Header -->
    <div class="bg-gradient-to-r from-cyan-500/20 to-fuchsia-500/20 border-b border-cyan-400/20 px-6 py-4 flex items-center justify-between">

      <div>
        <div class="text-cyan-300 text-sm tracking-[0.3em] uppercase">
          夜行区
        </div>

        <h1 class="text-2xl font-black tracking-wide mt-1">
          调查系统
        </h1>
      </div>

      <div class="flex items-center gap-2">
        <div class="w-3 h-3 rounded-full bg-green-400 animate-pulse"></div>
        <span class="text-sm text-green-300">安全连线</span>
      </div>
    </div>

    <!-- Body -->
    <div class="px-6 py-8 space-y-8">

      <!-- Story -->
      <div class="rounded-2xl border border-fuchsia-500/20 bg-black/30 p-5">

        <div class="text-fuchsia-300 text-xs tracking-[0.25em] uppercase mb-3">
          紧急案件档案
        </div>

        <p class="text-slate-200 leading-7 text-base">
          Mr. Big 的孙女 Judith 在夜行区失踪了。
          监控讯号不稳定，通讯频道也遭到干扰。
        </p>

        <p class="text-slate-300 leading-7 text-base mt-4">
          Mr. Big 已授权特别调查小队，
          必须在午夜之前找到 Judith。
        </p>

        <p class="text-slate-300 leading-7 text-base mt-4">
          调查员必须验证身份，
          才能解锁最终指示。
        </p>
      </div>

      <!-- Input -->
      <div class="space-y-4">

        <label class="block text-cyan-300 uppercase tracking-[0.2em] text-sm font-semibold">
          输入警察热线号码
        </label>

        <div class="flex flex-col sm:flex-row gap-3">

          <input
            id="codeInput"
            type="password"
            placeholder="请输入热线号码……"
            class="flex-1 bg-slate-950 border border-cyan-500/30 rounded-2xl px-5 py-4 text-lg outline-none focus:border-cyan-300 focus:ring-2 focus:ring-cyan-400/30 transition"
          />

          <button
            onclick="verifyCode()"
            class="rounded-2xl bg-gradient-to-r from-cyan-400 to-fuchsia-500 px-6 py-4 font-bold text-slate-950 hover:scale-105 transition-transform shadow-lg shadow-cyan-500/20"
          >
            验证
          </button>

        </div>
      </div>

      <!-- Success -->
      <div
        id="successBox"
        class="hidden-box rounded-2xl border border-green-500/20 bg-green-500/10 p-5 space-y-3"
      >

        <div class="flex items-center gap-2">
          <div class="w-3 h-3 rounded-full bg-green-400 animate-pulse"></div>

          <div class="text-green-300 uppercase tracking-[0.2em] text-sm font-bold">
            验证成功
          </div>
        </div>

        <div class="text-slate-100 text-lg leading-8">
          请前往
          <span class="font-black text-yellow-300">
            电影院
          </span>
          ，并向保安说出暗号：
        </div>

        <div class="rounded-xl bg-black/40 border border-yellow-400/20 p-4 text-center text-2xl font-black tracking-wide text-yellow-200">
          “兔兔万岁万岁 万万岁”
        </div>

      </div>

      <!-- Error -->
      <div
        id="errorBox"
        class="hidden-box rounded-2xl border border-red-500/20 bg-red-500/10 p-4 text-red-300"
      >
        热线号码错误，请重新输入。
      </div>

    </div>

    <!-- Footer -->
    <div class="border-t border-slate-700/50 px-6 py-4 text-xs text-slate-500 flex items-center justify-between">
      <span>夜行区警察情报网络</span>
      <span>Case #JB-017</span>
    </div>

  </div>

	<script>
	  // SHA-256
	  const correctHash =
		"5fc8e8f0cfd4f0f47d18b105475a0caa190fc340d03f04b34051d494afaadfef";

	  async function sha256(text) {
		const msgUint8 = new TextEncoder().encode(text);
		const hashBuffer = await crypto.subtle.digest("SHA-256", msgUint8);
		const hashArray = Array.from(new Uint8Array(hashBuffer));

		return hashArray
		  .map(b => b.toString(16).padStart(2, "0"))
		  .join("");
	  }

	  async function verifyCode() {
		const input = document.getElementById("codeInput").value;

		const successBox = document.getElementById("successBox");
		const errorBox = document.getElementById("errorBox");

		const inputHash = await sha256(input);

		if (inputHash === correctHash) {
		  successBox.style.display = "block";
		  errorBox.style.display = "none";
		} else {
		  successBox.style.display = "none";
		  errorBox.style.display = "block";
		}
	  }
	</script>

</body>
</html>
